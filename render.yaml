# Render Blueprint — sthir-api
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sthir-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
